name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
        
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: "A clear description of what you want to happen..."
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions you've considered
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        - Use cases
        - Performance requirements
        - Security considerations
        - Example code or pseudocode
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      options:
        - Low (Nice to have)
        - Medium (Would improve workflow)
        - High (Blocking or critical)
    validations:
      required: true
      
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution
      description: Would you be interested in implementing this feature?
      options:
        - label: Yes, I'd like to contribute to this feature
          required: false
